<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MDR Farbgenetik Rechner</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div>
          <h1>MDR Farbgenetik Rechner</h1>
        </div>
      </header>

      <main class="grid">
        <section class="card">
          <h2>Genetik der Eltern</h2>

          <div class="twoCol">
            <div>
              <h3>Stute</h3>
              <div class="formRow">
                <label for="p1_E">Extension (E/e)</label>
                <select id="p1_E"></select>
              </div>
              <div class="formRow">
                <label for="p1_A">Agouti (A+, A, At, a)</label>
                <select id="p1_A"></select>
              </div>
              <div class="formRow">
                <label for="p1_D">Dun (D/d)</label>
                <select id="p1_D"></select>
              </div>
              <div class="formRow">
                <label for="p1_CrPrl">Cream / Pearl (Cr/cr/prl)</label>
                <select id="p1_CrPrl"></select>
              </div>
              <div class="formRow">
                <label for="p1_Ch">Champagne (Ch/ch)</label>
                <select id="p1_Ch"></select>
              </div>
              <div class="formRow">
                <label for="p1_G">Grey (G/g)</label>
                <select id="p1_G"></select>
              </div>
              <div class="formRow">
                <label for="p1_Z">Silver (Z/z)</label>
                <select id="p1_Z"></select>
              </div>
              <div class="formRow">
                <label for="p1_O">Overo (O/o)</label>
                <select id="p1_O"></select>
              </div>
              <div class="formRow">
                <label for="p1_SPL">Splashed White (SPL/spl)</label>
                <select id="p1_SPL"></select>
              </div>
              <div class="formRow">
                <label for="p1_Fl">Flaxen (Fl/fl)</label>
                <select id="p1_Fl"></select>
              </div>
              <div class="formRow">
                <label for="p1_Sty">Sooty (Sty/sty)</label>
                <select id="p1_Sty"></select>
              </div>
              <div class="formRow">
                <label for="p1_Ra">Rabicano (Ra/ra)</label>
                <select id="p1_Ra"></select>
              </div>
            </div>

            <div>
              <h3>Hengst</h3>
              <div class="formRow">
                <label for="p2_E">Extension (E/e)</label>
                <select id="p2_E"></select>
              </div>
              <div class="formRow">
                <label for="p2_A">Agouti (A+, A, At, a)</label>
                <select id="p2_A"></select>
              </div>
              <div class="formRow">
                <label for="p2_D">Dun (D/d)</label>
                <select id="p2_D"></select>
              </div>
              <div class="formRow">
                <label for="p2_CrPrl">Cream / Pearl (Cr/cr/prl)</label>
                <select id="p2_CrPrl"></select>
              </div>
              <div class="formRow">
                <label for="p2_Ch">Champagne (Ch/ch)</label>
                <select id="p2_Ch"></select>
              </div>
              <div class="formRow">
                <label for="p2_G">Grey (G/g)</label>
                <select id="p2_G"></select>
              </div>
              <div class="formRow">
                <label for="p2_Z">Silver (Z/z)</label>
                <select id="p2_Z"></select>
              </div>
              <div class="formRow">
                <label for="p2_O">Overo (O/o)</label>
                <select id="p2_O"></select>
              </div>
              <div class="formRow">
                <label for="p2_SPL">Splashed White (SPL/spl)</label>
                <select id="p2_SPL"></select>
              </div>
              <div class="formRow">
                <label for="p2_Fl">Flaxen (Fl/fl)</label>
                <select id="p2_Fl"></select>
              </div>
              <div class="formRow">
                <label for="p2_Sty">Sooty (Sty/sty)</label>
                <select id="p2_Sty"></select>
              </div>
              <div class="formRow">
                <label for="p2_Ra">Rabicano (Ra/ra)</label>
                <select id="p2_Ra"></select>
              </div>
            </div>
          </div>

          <div class="actions">
            <button id="calcBtn" class="primary">Berechnen</button>
            <button id="resetBtn" class="secondary">Zurücksetzen</button>
          </div>

          <details class="help">
            <summary>Hinweise</summary>
          </details>
        </section>

        <section class="card">
          <h2>Mögliche Farbe des Fohlens</h2>
          <div id="result" class="result muted">Wähle die Genotypen und klicke auf „Berechnen“.</div>
        </section>
      </main>

      <footer class="footer muted">
        Lokal öffnen: Doppelklick auf <code>index.html</code>.
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
